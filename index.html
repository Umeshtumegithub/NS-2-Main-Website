<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NS-2 Department Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  /* Dynamic 3-Color Space Palette */
  --bg-dark: #070b19;
  --accent: #ff007f;
  --light: #f0f4fb;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Exo 2', sans-serif;
  background: var(--bg-dark);
  background-image: linear-gradient(135deg, #0a1128 0%, #2b001e 40%, #4a1525 65%, #3d3000 100%);
  color: var(--light);
  height: 100vh;
  overflow: hidden;
  perspective: 1000px;
}

/* ── INTERACTIVE COLOR AURORAS ── */
.bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}
.aurora {
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.35;
  mix-blend-mode: screen;
}
.aurora:nth-child(1) { width:700px;height:600px;background:radial-gradient(circle, #00d2ff, transparent 70%);top:-100px;left:-100px;animation:drift1 20s ease-in-out infinite alternate; }
.aurora:nth-child(2) { width:650px;height:650px;background:radial-gradient(circle, #ff007f, transparent 70%);top:25%;right:-200px;animation:drift2 25s ease-in-out infinite alternate; }
.aurora:nth-child(3) { width:600px;height:550px;background:radial-gradient(circle, #ffcc00, transparent 70%);bottom:-150px;left:20%;animation:drift3 28s ease-in-out infinite alternate; }

@keyframes drift1 { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(100px,80px) scale(1.15)} }
@keyframes drift2 { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(-100px,100px) scale(0.9)} }
@keyframes drift3 { 0%{transform:translate(0,0) scale(0.9)} 100%{transform:translate(80px,-80px) scale(1.1)} }

/* ── STARS ── */
.stars { position:absolute;inset:0;overflow:hidden; }
.star { position:absolute;background:white;border-radius:50%;animation:twinkle ease-in-out infinite; }
@keyframes twinkle { 0%,100%{opacity:0.1;transform:scale(0.8)} 50%{opacity:1;transform:scale(1.4)} }

/* ── TECH GRID ── */
.grid-overlay {
  position:absolute;inset:0;
  background-image: linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
  background-size:55px 55px;
}
.grid-overlay::after {
  content: '';
  position: absolute;
  top: -50%; left: 0; right: 0; height: 12%;
  background: linear-gradient(to bottom, transparent, rgba(255, 0, 127, 0.03), transparent);
  animation: scanline 7s linear infinite;
}
@keyframes scanline { 0% { top: -50%; } 100% { top: 150%; } }

/* ── LAYOUT ── */
.page { position:relative;z-index:1;height:100vh;display:flex;flex-direction:column; }

/* ── HEADER ── */
header { text-align:center;padding:25px 20px 15px; animation: dropDown 1s cubic-bezier(0.16, 1, 0.3, 1) both; }
.header-line { width:120px;height:3px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin:0 auto 15px; }
header h1 {
  font-family:'Rajdhani',sans-serif;
  font-size:clamp(2rem,4.5vw,3.2rem);
  font-weight:700;letter-spacing:8px;
  background:linear-gradient(135deg,#00d2ff 0%,#ff007f 50%,#ffcc00 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 6s linear infinite;background-size:200% 100%;
}
@keyframes shimmer { 0%{background-position:0% 50%} 100%{background-position:200% 50%} }
header p { margin-top:8px;color:rgba(240, 244, 251, 0.6);font-size:0.85rem;letter-spacing:5px;text-transform:uppercase; }
.header-bottom-line { width:100%;max-width:800px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);margin:15px auto 0; }

@keyframes dropDown { from{opacity:0;transform:translateY(-30px);filter:blur(5px);} to{opacity:1;transform:translateY(0);filter:blur(0);} }

/* ── CONTAINER ── */
.container { max-width:1340px;width:100%;margin:0 auto;padding:10px 24px 20px;flex:1;display:flex;flex-direction:column; }

/* ── DASHBOARD GRID ── */
.grid { 
  display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);gap:16px;flex:1; 
  animation: gridIntro 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
}
@keyframes gridIntro { from{opacity:0;transform:rotateX(12deg) translateY(40px);} to{opacity:1;transform:rotateX(0deg) translateY(0);} }

/* ── HIGH-TECH BUTTONS ── */
.card {
  position:relative;border-radius:12px;text-align:center;cursor:pointer;text-decoration:none;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  border:1px solid rgba(255,255,255,0.06);
  backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);
  transform-style: preserve-3d;
  transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.4s ease, border-color 0.4s ease, background 0.4s ease;
  animation:cardIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
}
@keyframes cardIn { from{opacity:0;transform:translateY(40px) scale(0.9);filter:blur(5px);} to{opacity:1;transform:translateY(0) scale(1);filter:blur(0);} }

/* ---- BRAND COLORS (Blue, Yellow, Pink Variations) ---- */
.card:nth-child(3n+1) { --c1:#00d2ff;--glow:rgba(0,210,255,0.22); background:rgba(0, 210, 255, 0.02); }
.card:nth-child(3n+2) { --c1:#ffcc00;--glow:rgba(255,204,0,0.18); background:rgba(255, 204, 0, 0.02); }
.card:nth-child(3n+3) { --c1:#ff007f;--glow:rgba(255,0,127,0.22); background:rgba(255, 0, 127, 0.02); }

/* Stagger delays */
.card:nth-child(1){animation-delay:0.03s} .card:nth-child(2){animation-delay:0.06s}
.card:nth-child(3){animation-delay:0.09s} .card:nth-child(4){animation-delay:0.12s}
.card:nth-child(5){animation-delay:0.15s} .card:nth-child(6){animation-delay:0.18s}
.card:nth-child(7){animation-delay:0.21s} .card:nth-child(8){animation-delay:0.24s}
.card:nth-child(9){animation-delay:0.27s} .card:nth-child(10){animation-delay:0.30s}
.card:nth-child(11){animation-delay:0.33s} .card:nth-child(12){animation-delay:0.36s}
.card:nth-child(13){animation-delay:0.39s} .card:nth-child(14){animation-delay:0.42s}
.card:nth-child(15){animation-delay:0.45s} .card:nth-child(16){animation-delay:0.48s}

/* Hologram rotation rings */
.card::before {
  content:'';position:absolute;width:130px;height:130px;
  border: 1px dashed var(--c1);border-radius:50%;
  opacity:0.02;transform: scale(0.6) rotate(0deg);
  transition: opacity 0.4s ease, transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
  pointer-events:none;z-index: 0;
}

/* Neon Top/Bottom Lines */
.card .top-bar {
  position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--c1),transparent);
  opacity:0.4;transition:all 0.35s ease;
}
.card .bottom-bar {
  position:absolute;bottom:0;left:50%;right:50%;height:2px;
  background:var(--c1);opacity:0;
  transition:all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

/* ── BUTTON HOVER ANIMATION ── */
.card:hover {
  transform: translateY(-6px) scale(1.03) rotateX(5deg);
  border-color: rgba(255, 255, 255, 0.15);
  background: rgba(255, 255, 255, 0.05);
  box-shadow: 0 15px 35px rgba(0,0,0,0.5), 0 0 25px var(--glow);
}
.card:hover::before {
  opacity: 0.12;
  transform: scale(1.25) rotate(90deg);
}
.card:hover .top-bar { opacity:1; background: var(--c1); }
.card:hover .bottom-bar { opacity:1; left:12%; right:12%; }

/* Tactile Click Micro-response */
.card:active {
  transform: translateY(-2px) scale(0.97);
  box-shadow: 0 5px 15px rgba(0,0,0,0.6), 0 0 10px var(--glow);
  transition: transform 0.1s;
}

/* ── BUTTON LABELS (BIGGER FONT SIZE) ── */
.card h2 {
  font-family:'Rajdhani',sans-serif;
  /* Increased from ~1.45rem to a dynamic clamp that caps at 1.95rem */
  font-size: clamp(1.15rem, 1.8vw, 1.95rem);
  font-weight: 700; /* Made slightly bolder for clarity at larger size */
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #cdd6e4;
  transition: all 0.35s ease;
  position: relative;
  z-index: 2;
  padding: 0 12px;
  transform: translateZ(25px);
  line-height: 1.2;
}
.card:hover h2 { 
  color: #ffffff;
  text-shadow: 0 0 15px var(--c1);
  letter-spacing: 2.5px;
}

/* ── FOOTER ── */
footer {
  text-align:center;padding:15px 20px;
  border-top:1px solid rgba(255,255,255,0.03);
  color:rgba(255, 255, 255, 0.2);font-size:0.8rem;letter-spacing:2px;
  position:relative;z-index:1;
}

/* ── RESPONSIVE COMPACTNESS ── */
@media(max-width:900px){ 
  .grid{grid-template-columns:repeat(4,1fr);gap:10px} 
  .card h2{font-size:1.1rem} 
}
@media(max-width:640px){ 
  .grid{grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(8,1fr);gap:10px} 
  .card h2{font-size:1.25rem} 
}
</style>
