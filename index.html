<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NS-2 Department Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#081221;
    --card:#10233d;
    --accent:#f5b942;
    --light:#f4f7fb;
    --blue:#1e88e5;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Exo 2',sans-serif;
    background:linear-gradient(135deg,#081221,#10233d);
    color:var(--light);
    min-height:100vh;
}

/* HEADER */

header{
    text-align:center;
    padding:40px 20px;
    border-bottom:2px solid var(--accent);
    background:rgba(0,0,0,0.25);
}

header h1{
    font-size:3rem;
    color:var(--accent);
    letter-spacing:3px;
    font-family:'Rajdhani',sans-serif;
}

header p{
    margin-top:10px;
    color:#d3d9e4;
    font-size:1rem;
}

/* MAIN CONTAINER */

.container{
    max-width:1200px;
    margin:40px auto;
    padding:20px;
}

/* GRID */

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:25px;
}

/* CARD */

.card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:18px;
    padding:30px 20px;
    text-align:center;
    transition:0.3s ease;
    box-shadow:0 8px 25px rgba(0,0,0,0.35);
}

.card:hover{
    transform:translateY(-8px);
    border-color:var(--accent);
}

/* CARD TITLE */

.card h2{
    font-family:'Rajdhani',sans-serif;
    color:var(--accent);
    margin-bottom:18px;
    font-size:1.8rem;
}

/* BUTTON */

.card a{
    display:inline-block;
    text-decoration:none;
    background:var(--blue);
    color:white;
    padding:12px 22px;
    border-radius:10px;
    font-weight:600;
    transition:0.3s ease;
}

.card a:hover{
    background:var(--accent);
    color:#000;
}

/* FOOTER */

footer{
    margin-top:40px;
    text-align:center;
    padding:20px;
    border-top:1px solid rgba(255,255,255,0.15);
    color:#c9d3df;
}

/* MOBILE RESPONSIVE */

@media(max-width:768px){

    header h1{
        font-size:2.2rem;
    }

}

</style>
</head>

<body>

<header>

    <h1>NS-2 Department Portal</h1>

    <p>Department Navigation Dashboard</p>

</header>

<div class="container">

    <div class="grid">

        <!-- IED -->

        <div class="card">
            <h2>IED</h2>
            <a href="IED.html">Open</a>
        </div>

        <!-- Assembly -->

        <div class="card">
            <h2>Assembly</h2>
            <a href="Assembly.html">Open</a>
        </div>

        <!-- HR -->

        <div class="card">
            <h2>HR</h2>
            <a href="HR.html">Open</a>
        </div>

        <!-- ROP -->

        <div class="card">
            <h2>ROP</h2>
            <a href="ROP.html">Open</a>
        </div>

        <!-- D&E -->

        <div class="card">
            <h2>D&E</h2>
            <a href="DE.html">Open</a>
        </div>

        <!-- Capital Budget -->

        <div class="card">
            <h2>Capital Budget</h2>
            <a href="CapitalBudget.html">Open</a>
        </div>

        <!-- Awards -->

        <div class="card">
            <h2>Awards</h2>
            <a href="Awards.html">Open</a>
        </div>

        <!-- Shop Improvement -->

        <div class="card">
            <h2>Shop Improvement</h2>
            <a href="ShopImprovement.html">Open</a>
        </div>

        <!-- Testing -->

        <div class="card">
            <h2>Testing</h2>
            <a href="Testing.html">Open</a>
        </div>

        <!-- Fabrication -->

        <div class="card">
            <h2>Fabrication</h2>
            <a href="Fabrication.html">Open</a>
        </div>

        <!-- Official Language -->

        <div class="card">
            <h2>Official Language</h2>
            <a href="OfficialLanguage.html">Open</a>
        </div>

    </div>

</div>

<footer>

    © 2026 NS-2 Department Website

</footer>

</body>
</html>
