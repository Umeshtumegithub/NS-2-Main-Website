<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NS(R&FCS) Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  /* NEW high-tech deep space color palette */
  --bg-dark: #030712;
  --bg-gradient: radial-gradient(circle at 10% 20%, rgba(4, 15, 36, 1) 0%, rgba(9, 3, 22, 1) 45%, rgba(2, 8, 16, 1) 90%);
  --accent: #00f2fe;
  --light: #f0f4fb;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Exo 2', sans-serif;
  background: var(--bg-dark);
  background-image: var(--bg-gradient);
  color: var(--light);
  height: 100vh;
  overflow: hidden;
  perspective: 1000px;
}

/* ── HIGH-TECH COSMIC BACKGROUND ── */
.bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}
.aurora {
  position: absolute;
  border-radius: 50%;
  filter: blur(100px);
  opacity: 0.25;
  mix-blend-mode: screen;
}
.aurora:nth-child(1) { width:800px;height:600px;background:radial-gradient(circle, #00f2fe, transparent 70%);top:-200px;left:-100px;animation:drift1 22s ease-in-out infinite alternate; }
.aurora:nth-child(2) { width:700px;height:700px;background:radial-gradient(circle, #9d4edd, transparent 70%);top:20%;right:-300px;animation:drift2 28s ease-in-out infinite alternate; }
.aurora:nth-child(3) { width:600px;height:500px;background:radial-gradient(circle, #059669, transparent 70%);bottom:-150px;left:25%;animation:drift3 32s ease-in-out infinite alternate; }
.aurora:nth-child(4) { width:500px;height:500px;background:radial-gradient(circle, #db2777, transparent 70%);top:40%;left:-200px;animation:drift1 25s ease-in-out infinite; }

@keyframes drift1 { 0%{transform:translate(0,0) rotate(0deg) scale(1)} 100%{transform:translate(150px,100px) rotate(180deg) scale(1.2)} }
@keyframes drift2 { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(-120px,150px) scale(0.85)} }
@keyframes drift3 { 0%{transform:translate(0,0) scale(0.9)} 100%{transform:translate(100px,-80px) scale(1.15)} }

/* ── STARS ── */
.stars { position:absolute;inset:0;overflow:hidden; }
.star { position:absolute;background:white;border-radius:50%;animation:twinkle ease-in-out infinite; }
@keyframes twinkle { 0%,100%{opacity:0.1;transform:scale(0.8)} 50%{opacity:1;transform:scale(1.5)} }

/* ── MATRIX-STYLE GRID SCANNER ── */
.grid-overlay {
  position:absolute;inset:0;
  background-image: linear-gradient(rgba(0, 242, 254, 0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 254, 0.015) 1px, transparent 1px);
  background-size:50px 50px;
}
.grid-overlay::after {
  content: '';
  position: absolute;
  top: -50%; left: 0; right: 0; height: 15%;
  background: linear-gradient(to bottom, transparent, rgba(0, 242, 254, 0.04), transparent);
  animation: scanline 8s linear infinite;
}
@keyframes scanline { 0% { top: -50%; } 100% { top: 150%; } }

/* ── LAYOUT ── */
.page { position:relative;z-index:1;height:100vh;display:flex;flex-direction:column; }

/* ── HEADER INTERACTIVE EFFECTS ── */
header { text-align:center;padding:25px 20px 15px; animation: dropDown 1s cubic-bezier(0.16, 1, 0.3, 1) both; }
.header-line { width:120px;height:3px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin:0 auto 15px; }
header h1 {
  font-family:'Rajdhani',sans-serif;
  font-size:clamp(2rem,4.5vw,3.2rem);
  font-weight:700;letter-spacing:8px;
  background:linear-gradient(135deg,#00f2fe 0%,#9d4edd 50%,#00f2fe 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 6s linear infinite;background-size:200% 100%;
}
@keyframes shimmer { 0%{background-position:0% 50%} 100%{background-position:200% 50%} }
header p { margin-top:8px;color:rgba(0, 242, 254, 0.6);font-size:0.85rem;letter-spacing:5px;text-transform:uppercase; }
.header-bottom-line { width:100%;max-width:800px;height:1px;background:linear-gradient(90deg,transparent,rgba(0, 242, 254, 0.3),transparent);margin:15px auto 0; }

@keyframes dropDown { from{opacity:0;transform:translateY(-30px);filter:blur(5px);} to{opacity:1;transform:translateY(0);filter:blur(0);} }

/* ── CONTAINER ── */
.container { max-width:1340px;width:100%;margin:0 auto;padding:10px 24px 20px;flex:1;display:flex;flex-direction:column; }

/* ── PERSPECTIVE GRID CONTAINER ── */
.grid { 
  display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);gap:16px;flex:1; 
  animation: gridIntro 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
}
@keyframes gridIntro { from{opacity:0;transform:rotateX(15deg) translateY(50px);} to{opacity:1;transform:rotateX(0deg) translateY(0);} }

/* ── REVOLUTIONIZED ANIMATED CARDS ── */
.card {
  position:relative;border-radius:12px;text-align:center;cursor:pointer;text-decoration:none;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  border:1px solid rgba(255,255,255,0.06);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  transform-style: preserve-3d;
  transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.4s ease, border-color 0.4s ease, background 0.4s ease;
  animation:cardIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
}
@keyframes cardIn { from{opacity:0;transform:translateY(40px) scale(0.9);filter:blur(5px);} to{opacity:1;transform:translateY(0) scale(1);filter:blur(0);} }

/* ---- BRANDED NEON COLOR LOGIC ---- */
.card:nth-child(1)  { --c1:#00f2fe;--glow:rgba(0,242,254,0.25); background:rgba(0, 242, 254, 0.03); }
.card:nth-child(2)  { --c1:#9d4edd;--glow:rgba(157,78,221,0.25); background:rgba(157, 78, 221, 0.03); }
.card:nth-child(3)  { --c1:#34d399;--glow:rgba(52,211,153,0.25); background:rgba(52, 211, 153, 0.03); }
.card:nth-child(4)  { --c1:#ff477e;--glow:rgba(255,71,126,0.25); background:rgba(255, 71, 126, 0.03); }
.card:nth-child(5)  { --c1:#f72585;--glow:rgba(247,37,133,0.25); background:rgba(247, 37, 133, 0.03); }
.card:nth-child(6)  { --c1:#f4a261;--glow:rgba(244,162,97,0.25); background:rgba(244, 162, 97, 0.03); }
.card:nth-child(7)  { --c1:#ee242c;--glow:rgba(238,36,44,0.25); background:rgba(238, 36, 44, 0.03); }
.card:nth-child(8)  { --c1:#06d6a0;--glow:rgba(6,214,160,0.25); background:rgba(6, 214, 160, 0.03); }
.card:nth-child(9)  { --c1:#3a86ff;--glow:rgba(58,134,255,0.25); background:rgba(58, 134, 255, 0.03); }
.card:nth-child(10) { --c1:#ff006e;--glow:rgba(255,0,110,0.25); background:rgba(255, 0, 110, 0.03); }
.card:nth-child(11) { --c1:#f1c40f;--glow:rgba(241,196,15,0.25); background:rgba(241, 196, 15, 0.03); }
.card:nth-child(12) { --c1:#00b4d8;--glow:rgba(0,180,216,0.25); background:rgba(0, 180, 216, 0.03); }
.card:nth-child(13) { --c1:#e67e22;--glow:rgba(230,126,34,0.25); background:rgba(230, 126, 34, 0.03); }
.card:nth-child(14) { --c1:#7209b7;--glow:rgba(114,9,183,0.25); background:rgba(114, 9, 183, 0.03); }
.card:nth-child(15) { --c1:#ff70a6;--glow:rgba(255,112,166,0.25); background:rgba(255, 112, 166, 0.03); }
.card:nth-child(16) { --c1:#2ecc71;--glow:rgba(46,204,113,0.25); background:rgba(46, 204, 113, 0.03); }

/* Staggered load-in sequence */
.card:nth-child(1){animation-delay:0.03s} .card:nth-child(2){animation-delay:0.06s}
.card:nth-child(3){animation-delay:0.09s} .card:nth-child(4){animation-delay:0.12s}
.card:nth-child(5){animation-delay:0.15s} .card:nth-child(6){animation-delay:0.18s}
.card:nth-child(7){animation-delay:0.21s} .card:nth-child(8){animation-delay:0.24s}
.card:nth-child(9){animation-delay:0.27s} .card:nth-child(10){animation-delay:0.30s}
.card:nth-child(11){animation-delay:0.33s} .card:nth-child(12){animation-delay:0.36s}
.card:nth-child(13){animation-delay:0.39s} .card:nth-child(14){animation-delay:0.42s}
.card:nth-child(15){animation-delay:0.45s} .card:nth-child(16){animation-delay:0.48s}

/* Animated geometric tech ring background on card */
.card::before {
  content:'';position:absolute;width:110px;height:110px;
  border: 1px dashed var(--c1);border-radius:50%;
  opacity:0.03;transform: scale(0.6) rotate(0deg);
  transition: opacity 0.4s ease, transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
  pointer-events:none;z-index: 0;
}

/* Glowing accent lines */
.card .top-bar {
  position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--c1),transparent);
  opacity:0.4;transition:all 0.35s ease;
}
.card .bottom-bar {
  position:absolute;bottom:0;left:50%;right:50%;height:2px;
  background:var(--c1);opacity:0;
  transition:all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

/* ── HOVER ANIMATION STATES ── */
.card:hover {
  transform: translateY(-6px) scale(1.03) rotateX(4deg);
  border-color: rgba(255, 255, 255, 0.2);
  background: rgba(255, 255, 255, 0.04);
  box-shadow: 0 15px 35px rgba(0,0,0,0.6), 0 0 25px var(--glow);
}
.card:hover::before {
  opacity: 0.15;
  transform: scale(1.2) rotate(90deg);
}
.card:hover .top-bar { opacity:1; background: var(--c1); }
.card:hover .bottom-bar { opacity:1; left:10%; right:10%; }

/* Micro click state animation */
.card:active {
  transform: translateY(-2px) scale(0.97);
  box-shadow: 0 5px 15px rgba(0,0,0,0.7), 0 0 10px var(--glow);
  transition: transform 0.1s;
}

/* ── CARD LABELS ── */
.card h2 {
  font-family:'Rajdhani',sans-serif;
  font-size:clamp(0.9rem,1.4vw,1.45rem);
  font-weight:600;letter-spacing:1px;text-transform:uppercase;
  color: #a3b3cc;
  transition: all 0.35s ease;
  position:relative;z-index:2;padding:0 10px;
  transform: translateZ(20px); /* 3D layer effect */
}
.card:hover h2 { 
  color: #ffffff;
  text-shadow: 0 0 10px var(--c1);
  letter-spacing: 2px;
}

/* ── FOOTER ── */
footer {
  text-align:center;padding:15px 20px;
  border-top:1px solid rgba(255,255,255,0.03);
  color:rgba(0, 242, 254, 0.25);font-size:0.8rem;letter-spacing:2px;
  position:relative;z-index:1;
}

/* ── RESPONSIVE COMPACTNESS ── */
@media(max-width:900px){ .grid{grid-template-columns:repeat(4,1fr);gap:10px} .card h2{font-size:0.85rem} }
@media(max-width:640px){ .grid{grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(8,1fr);gap:10px} .card h2{font-size:0.95rem} }
</style>
</head>
